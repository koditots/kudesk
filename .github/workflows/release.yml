name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            runtime: win-x64
            suffix: .exe
          - os: macos-latest
            runtime: osx-x64
            suffix: .dmg

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install Avalonia templates
        run: dotnet new install Avalonia.Templates

      - name: Restore dependencies
        run: dotnet restore --verbosity minimal

      - name: Build
        run: dotnet publish src/Kudesk.App -c Release -r ${{ matrix.runtime }} --self-contained true -o publish/${{ matrix.runtime }}

      - name: Package with Velopack
        run: |
          dotnet tool install -g vpk
          vpk pack --packId Kudesk --packVersion ${{ github.ref_name }} --packDir publish/${{ matrix.runtime }} --outputDir releases/${{ matrix.runtime }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.runtime }}
          path: releases/${{ matrix.runtime }}/*

  create-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-win-x64
          path: releases/win

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-osx-x64
          path: releases/osx

      - name: Create GitHub Release
        run: |
          gh release create ${{ github.ref_name }} \
            releases/win/* \
            releases/osx/* \
            --title "Kudesk ${{ github.ref_name }}" \
            --notes "Production release of Kudesk POS"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}