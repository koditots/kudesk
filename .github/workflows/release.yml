name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install Avalonia templates
        run: dotnet new install Avalonia.Templates

      - name: Restore dependencies
        run: dotnet restore --verbosity minimal

      - name: Build
        run: dotnet publish src/Kudesk.App -c Release -r win-x64 --self-contained true -o publish/win

      - name: Package with Velopack
        run: |
          dotnet tool install -g vpk
          $version = ${{ github.ref_name }} -replace '^v', ''
          vpk pack --packId Kudesk --packVersion $version --packDir publish/win --outputDir releases/win

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-win
          path: releases/win/*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-win
          path: releases/win

      - name: Create GitHub Release
        run: |
          VERSION=${{ github.ref_name }} -replace '^v',''
          gh release create ${{ github.ref_name }} \
            releases/win/* \
            --title "Kudesk v$VERSION" \
            --notes "New release with interactive UI - clickable navigation, dialogs, cart and checkout system"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}